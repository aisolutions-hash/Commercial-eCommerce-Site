version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: kalisoft-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postdb123
      POSTGRES_DB: kalisoft_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kalisoft-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postdb123@db:5432/kalisoft_ecommerce
      JWT_SECRET: your-local-test-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      APP_URL: http://localhost:3000
      USE_CLOUD_SQL: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: kalisoft-web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: kalisoft-network
