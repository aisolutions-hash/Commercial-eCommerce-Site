server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API requests backend ko forward karo
    location /api/ {
        proxy_pass https://kalisoft-api-19782268668.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host kalisoft-api-19782268668.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
